services:

  postgres:
    image: postgres:16-alpine
    container_name: goflux_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./migrations/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - goflux_network

  pgbouncer:
    image: pgbouncer/pgbouncer:latest
    container_name: goflux_pgbouncer
    restart: unless-stopped
    environment:
      DATABASES_HOST: ${POSTGRES_HOST}
      DATABASES_PORT: ${POSTGRES_PORT}
      DATABASES_DBNAME: ${POSTGRES_DB}
      PGBOUNCER_LISTEN_PORT: ${PGBOUNCER_LISTEN_PORT}
    ports:
      - "${PGBOUNCER_LISTEN_PORT}:${PGBOUNCER_LISTEN_PORT}"
    volumes:
      - ./docker/pgbouncer/pgbouncer.ini:/etc/pgbouncer/pgbouncer.ini:ro
      - ./docker/pgbouncer/userlist.txt:/etc/pgbouncer/userlist.txt:ro
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - goflux_network

volumes:
  postgres_data:
    driver: local

networks:
  goflux_network:
    driver: bridge